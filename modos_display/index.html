<!DOCTYPE html>
<html lang="en">
<head>
    <style>
     .elemento{
        display: inline;
        background-color: #000;
        color:white;
      width: 200px;
      height: 200px;


     }
     .resaltado{
        color:aqua;
        letter-spacing:2px;
        font-family: arial;
        font-size: large;
        font-weight: bold;
     }
     .elemento_block{
        display:block;
        background-color: #023;
        color: rgb(228,62,62);
        width: 200PX;
        height: 200PX;
     }
    </style>
    
</head>
<body>
    <h1>inline</h1>
    <div class="elemento">
        Productos 
    </div>
    <div class="elemento resaltado">
        Nosostros
    </div>
    <div class="elemento">
        Contacto
    </div>
    <div class="elemento resaltado">
        servicios 
    </div>
    <hr>
    <h1> Block:</h1>
   
    <div class="elemento_block">
        Productos 
    </div>
    <div class="elemento_block">
        Nosostros
    </div>
    <div class="elemento_block">
        Contacto
    </div>
    <div class="elemento_block">
        servicios 
    </div>

</body>
</html>
